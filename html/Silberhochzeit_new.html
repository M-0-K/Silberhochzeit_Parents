<!DOCTYPE html>
<html lang="de"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <title>Silberhochzeit – Wir feiern 25 Jahre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #F6F1EC;
      color: #333;
      line-height: 1.6;
    }

    header {
      background: #c0c0c0;
      padding: 40px 20px;
      text-align: center;
    }

    header img {
      max-width: 600px;
      width: 90%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    section {
      max-width: 900px;
      margin: 20px auto;
      background: rgba(227, 216, 197, 0.9);
      padding: 25px;
      border-radius: 8px;
    }

    h2 {
      color: #555;
      font-size: 1.5em;
      text-align: center;
    }

    /* Ticket Bereich */
    .ticket-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .ticket {
      text-align: center;
      max-width: 260px;
    }

    .ticket img {
      width: 220px;
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    .ticket img:hover {
      transform: scale(1.05);
    }

    .drinks-link {
      display: block;
      text-align: center;
      margin: 10px auto 0;
      padding: 14px 30px;
      background: #555;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 1.1em;
      max-width: 260px;
    }

    .drinks-link:hover {
      background: #333;
    }

    .ticket p {
      margin-top: 15px;
      font-size: 1em;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #777;
    }

    /* Mobile */
    @media (max-width: 600px) {
      header {
        padding: 30px 15px;
      }

      h2 {
        font-size: 1.3em;
      }

      .ticket-container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>

<body>

<header>
  <img src="../assets/VIP.png" alt="Silberhochzeit VIP Titelbild">
</header>

<section>
  <h2 style="text-align: center;">🎉 Herzlich Willkommen!</h2>

  <p style="text-align: center;">
    Wir freuen uns sehr darauf, mit euch zu feiern! <br>
    Hier kommt der <strong>Guide</strong> für alles, was ihr wissen müsst.
    <br>
  </p>

</section>


<section>
  <h2>Ticketauswahl</h2>

  <div class="ticket-container">

    <div class="ticket">
      <a href="vip.html">
        <img src="../assets/IconVip.png" alt="VIP Guest Ticket">
      </a>
      <p>
        <strong>VIP Guest Ticket</strong><br>
        
      </p>
    </div>

    <div class="ticket">
      <a href="vip50.html">
        <img src="../assets/IconVip50.png" alt="VIP Guest 50 Ticket">
      </a>
      <p>
        <strong>VIP Guest 50 Ticket</strong><br>
      
      </p>
    </div>

  </div>
</section>

<section>
  <h2>🍹 Getränkekarte</h2>
  <p style="text-align:center;">Neugierig, was es zu trinken gibt?</p>
  <a class="drinks-link" href="getraenkekarte.html">Zur Getränkekarte</a>
</section>

<footer>
  © 2026 – Claudia &amp; Tom
</footer>



</body></html>
