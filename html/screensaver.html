<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Silberhochzeit 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    /* ── Particle canvas behind everything ── */
    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    /* ── Center stage ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    /* ── Ticket ── */
    .ticket-wrap {
      animation: float 4s ease-in-out infinite;
      filter: drop-shadow(0 0 40px rgba(192,192,192,0.35)) drop-shadow(0 0 80px rgba(192,192,192,0.15));
      transition: filter 0.3s;
    }
    .ticket-wrap:hover {
      filter: drop-shadow(0 0 60px rgba(232,162,0,0.5)) drop-shadow(0 0 120px rgba(232,162,0,0.2));
    }
    .ticket-wrap img {
      width: min(700px, 85vw);
      height: auto;
      display: block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-18px) rotate(1deg); }
    }

    /* ── Hint text ── */
    .hint {
      color: rgba(255,255,255,0.35);
      font-family: Arial, sans-serif;
      font-size: clamp(0.85em, 2vw, 1.1em);
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: pulse-text 2.5s ease-in-out infinite;
    }

    @keyframes pulse-text {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 0.7; }
    }

    /* ── Title ── */
    .title {
      color: rgba(192,192,192,0.6);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.7em, 1.5vw, 0.95em);
      letter-spacing: 6px;
      text-transform: uppercase;
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ── Year ── */
    .year {
      color: rgba(192,192,192,0.25);
      font-family: 'Courier New', monospace;
      font-size: clamp(0.65em, 1.2vw, 0.85em);
      letter-spacing: 4px;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="stage">
  <a class="ticket-wrap" href="anzeigetafel_new.html">
    <img src="../assets/VIP.png" alt="VIP Ticket">
  </a>
  <p class="hint"></p>
</div>

<p class="title">Silberhochzeit &nbsp;·&nbsp; Claudia &amp; Tom</p>
<p class="year">&copy; 2026</p>

<script>
  // ── Particle system ──
  const canvas = document.getElementById('particles');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PARTICLE_COUNT = 80;
  const particles = Array.from({ length: PARTICLE_COUNT }, () => spawn(true));

  function spawn(randomY = false) {
    return {
      x:     Math.random() * canvas.width,
      y:     randomY ? Math.random() * canvas.height : canvas.height + 10,
      size:  0.5 + Math.random() * 1.8,
      speed: 0.2 + Math.random() * 0.5,
      alpha: 0.1 + Math.random() * 0.5,
      drift: (Math.random() - 0.5) * 0.3,
    };
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const p of particles) {
      p.y     -= p.speed;
      p.x     += p.drift;
      p.alpha += (Math.random() - 0.5) * 0.02;
      p.alpha  = Math.max(0.05, Math.min(0.65, p.alpha));

      if (p.y < -10) Object.assign(p, spawn(false), { x: Math.random() * canvas.width });

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(210,200,180,${p.alpha})`;
      ctx.fill();
    }

    requestAnimationFrame(tick);
  }
  tick();

  // ── Click anywhere → navigate ──
  document.body.addEventListener('click', () => {
    window.location.href = 'anzeigetafel_new.html';
  });
</script>

</body>
</html>
